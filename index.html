<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimal-Web | Management System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Sinhala:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div id="school-logo-img" class="logo-img">
                        <img src="logo.png" alt="School Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                    </div>
                    <button class="edit-logo-btn" onclick="document.getElementById('logo-upload').click()">
                        <i data-lucide="edit-3"></i>
                    </button>
                    <input type="file" id="logo-upload" hidden accept="image/*">
                </div>
                <h1 id="sidebar-school-name">දහම් පාසල</h1>
                <button id="close-sidebar" class="mobile-only"><i data-lucide="x"></i></button>
            </div>
            
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i> <span>මුල පිටුව</span>
                </button>
                <button class="nav-item" data-view="students">
                    <i data-lucide="users"></i> <span>සිසුන්</span>
                </button>
                <button class="nav-item" data-view="teachers">
                    <i data-lucide="user-cog"></i> <span>ගුරුවරුන්</span>
                </button>
                <button class="nav-item" data-view="leaders">
                    <i data-lucide="award"></i> <span>ශිෂ්‍ය නායකයින්</span>
                </button>
                <button class="nav-item" data-view="attendance">
                    <i data-lucide="calendar-check"></i> <span>පැමිණීම</span>
                </button>
                <button class="nav-item" data-view="points">
                    <i data-lucide="sparkles"></i> <span>මල් / ගිලන්පස ලකුණු</span>
                </button>
                <button class="nav-item" data-view="exams">
                    <i data-lucide="file-text"></i> <span>විභාග හා ලකුණු</span>
                </button>
                <button class="nav-item" data-view="interviews">
                    <i data-lucide="clipboard-list"></i> <span>නායක සම්මුඛ පරීක්ෂණ</span>
                </button>
                <button class="nav-item" data-view="notices">
                    <i data-lucide="megaphone"></i> <span>දැන්වීම් පුවරුව</span>
                </button>
                <button class="nav-item" data-view="settings">
                    <i data-lucide="settings"></i> <span>කළමනාකරණය</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button id="install-btn" class="install-btn">
                    <i data-lucide="download"></i> <span>ඇප් එක ස්ථාපනය කරන්න</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content" class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <button id="menu-toggle" class="menu-btn">
                        <i data-lucide="menu"></i>
                    </button>
                    <div class="header-info">
                        <h2 id="current-view-title">මුල පිටුව</h2>
                        <p id="current-date"></p>
                    </div>
                </div>
                
                <div class="header-actions">
                    <button id="refresh-btn" class="theme-btn" onclick="window.location.reload()" title="පිටුව Refresh කරන්න">
                        <i data-lucide="refresh-cw"></i>
                    </button>
                    <button id="theme-toggle-btn" class="theme-btn" onclick="toggleTheme()" title="තේමාව වෙනස් කරන්න">
                        <i data-lucide="palette"></i>
                    </button>
                    <button id="install-btn-top" class="install-btn-compact" style="display:none">
                        <i data-lucide="download"></i>
                    </button>
                    <button id="save-all-btn" class="save-btn">
                        <i data-lucide="save"></i> <span>සුරකින්න</span>
                    </button>
                </div>
            </header>

            <div id="view-container" class="view-container">
                <!-- Views will be rendered here dynamically -->
            </div>
        </main>
        
        <!-- Mobile Bottom Nav -->
        <nav class="mobile-nav">
            <button class="mobile-nav-item active" data-view="dashboard">
                <i data-lucide="layout-dashboard"></i>
                <span>මුල</span>
            </button>
            <button class="mobile-nav-item" data-view="students">
                <i data-lucide="users"></i>
                <span>සිසුන්</span>
            </button>
            <button class="mobile-nav-item" data-view="attendance">
                <i data-lucide="calendar-check"></i>
                <span>පැමිණීම</span>
            </button>
            <button class="mobile-nav-item" data-view="points">
                <i data-lucide="sparkles"></i>
                <span>ලකුණු</span>
            </button>
            <button class="mobile-nav-item" data-view="settings">
                <i data-lucide="settings"></i>
                <span>සැකසුම්</span>
            </button>
        </nav>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-container hidden">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="modal-title">Edit</h3>
                <button onclick="closeModal()"><i data-lucide="x"></i></button>
            </header>
            <div id="modal-body" class="modal-body">
                <!-- Form fields go here -->
            </div>
            <footer class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">අවලංගු කරන්න</button>
                <button id="modal-save-btn" class="btn-primary">තහවුරු කරන්න</button>
            </footer>
        </div>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    
    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
